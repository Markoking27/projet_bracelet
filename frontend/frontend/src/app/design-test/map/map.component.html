<!-- DESIGN-TEST -->
<div class="map-wrapper" role="img" aria-label="Grille de localisation avec positions estimées des bracelets">
  <svg
    class="venue-svg"
    viewBox="0 0 800 500"
    xmlns="http://www.w3.org/2000/svg"
  >
    <defs>
      <!-- Petite grille (50px) -->
      <pattern id="dt-small-grid" width="50" height="50" patternUnits="userSpaceOnUse">
        <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(148,163,184,0.07)" stroke-width="0.5"/>
      </pattern>
      <!-- Grande grille (100px) -->
      <pattern id="dt-big-grid" width="100" height="100" patternUnits="userSpaceOnUse">
        <rect width="100" height="100" fill="url(#dt-small-grid)"/>
        <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(148,163,184,0.13)" stroke-width="1"/>
      </pattern>

      <!-- Cercle flou pour l'incertitude RSSI -->
      <radialGradient id="dt-uncertainty" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.12"/>
        <stop offset="70%"  stop-color="#3b82f6" stop-opacity="0.05"/>
        <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
      </radialGradient>

      <!-- Incertitude par niveau -->
      <radialGradient id="dt-unc-1" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="dt-unc-2" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#f97316" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="dt-unc-3" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#ef4444" stop-opacity="0.22"/>
        <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- ── Fond + grille ── -->
    <rect width="800" height="500" fill="#1e293b"/>
    <rect width="800" height="500" fill="url(#dt-big-grid)"/>

    <!-- Bordure de la zone active -->
    <rect x="40" y="30" width="720" height="440" rx="2"
      fill="none" stroke="rgba(148,163,184,0.15)" stroke-width="1" stroke-dasharray="6 4"/>

    <!-- ── Labels d'axe X (tous les 100px) ── -->
    <text x="40"  y="22" text-anchor="middle" fill="rgba(148,163,184,0.35)" font-family="'Fira Code',monospace" font-size="9">0</text>
    <text x="140" y="22" text-anchor="middle" fill="rgba(148,163,184,0.35)" font-family="'Fira Code',monospace" font-size="9">100</text>
    <text x="240" y="22" text-anchor="middle" fill="rgba(148,163,184,0.35)" font-family="'Fira Code',monospace" font-size="9">200</text>
    <text x="340" y="22" text-anchor="middle" fill="rgba(148,163,184,0.35)" font-family="'Fira Code',monospace" font-size="9">300</text>
    <text x="440" y="22" text-anchor="middle" fill="rgba(148,163,184,0.35)" font-family="'Fira Code',monospace" font-size="9">400</text>
    <text x="540" y="22" text-anchor="middle" fill="rgba(148,163,184,0.35)" font-family="'Fira Code',monospace" font-size="9">500</text>
    <text x="640" y="22" text-anchor="middle" fill="rgba(148,163,184,0.35)" font-family="'Fira Code',monospace" font-size="9">600</text>
    <text x="740" y="22" text-anchor="middle" fill="rgba(148,163,184,0.35)" font-family="'Fira Code',monospace" font-size="9">700</text>

    <!-- ── Labels d'axe Y (tous les 100px) ── -->
    <text x="28" y="34"  text-anchor="end" fill="rgba(148,163,184,0.35)" font-family="'Fira Code',monospace" font-size="9">0</text>
    <text x="28" y="134" text-anchor="end" fill="rgba(148,163,184,0.35)" font-family="'Fira Code',monospace" font-size="9">100</text>
    <text x="28" y="234" text-anchor="end" fill="rgba(148,163,184,0.35)" font-family="'Fira Code',monospace" font-size="9">200</text>
    <text x="28" y="334" text-anchor="end" fill="rgba(148,163,184,0.35)" font-family="'Fira Code',monospace" font-size="9">300</text>
    <text x="28" y="434" text-anchor="end" fill="rgba(148,163,184,0.35)" font-family="'Fira Code',monospace" font-size="9">400</text>

    <!-- ── Triangle de couverture entre balises ── -->
    <polygon
      points="150,80 650,80 400,430"
      fill="rgba(59,130,246,0.04)"
      stroke="rgba(59,130,246,0.15)"
      stroke-width="1"
      stroke-dasharray="8 5"
    />

    <!-- ── Balises fixes (B1, B2, B3) ── -->
    <!-- B1 haut-gauche -->
    <g class="beacon" transform="translate(150,80)">
      <circle r="16" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-6" y1="-3" x2="0" y2="-8" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="6"  y1="-3" x2="0" y2="-8" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
      <text x="0" y="30" text-anchor="middle" fill="#60a5fa" font-family="'Fira Code',monospace" font-size="10" font-weight="600">B1</text>
    </g>

    <!-- B2 haut-droite -->
    <g class="beacon" transform="translate(650,80)">
      <circle r="16" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-6" y1="-3" x2="0" y2="-8" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="6"  y1="-3" x2="0" y2="-8" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
      <text x="0" y="30" text-anchor="middle" fill="#60a5fa" font-family="'Fira Code',monospace" font-size="10" font-weight="600">B2</text>
    </g>

    <!-- B3 bas-centre -->
    <g class="beacon" transform="translate(400,430)">
      <circle r="16" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-6" y1="-3" x2="0" y2="-8" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="6"  y1="-3" x2="0" y2="-8" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
      <text x="0" y="30" text-anchor="middle" fill="#60a5fa" font-family="'Fira Code',monospace" font-size="10" font-weight="600">B3</text>
    </g>

    <!-- ── Bracelets (dynamiques) ── -->
    @for (b of bracelets(); track b.id) {
      <g
        class="bracelet-marker"
        [class.bracelet-marker--selected]="isSelected(b)"
        [class.bracelet-marker--alert]="b.level > 0"
        (click)="braceletClick.emit(b)"
        (keydown.enter)="braceletClick.emit(b)"
        (keydown.space)="braceletClick.emit(b)"
        role="button"
        tabindex="0"
        [attr.aria-label]="'Bracelet ' + b.id + ', niveau ' + b.level + ', BPM ' + b.bpm"
        [attr.aria-pressed]="isSelected(b)"
      >
        <!-- Zone d'incertitude RSSI (~10-15m simulés) -->
        <circle
          [attr.cx]="b.x" [attr.cy]="b.y" r="45"
          [attr.fill]="'url(#dt-unc-' + (b.level > 0 ? b.level : 0) + ')'"
          [attr.fill]="b.level === 0 ? 'url(#dt-uncertainty)' : 'url(#dt-unc-' + b.level + ')'"
          class="uncertainty-zone"
        />

        <!-- Anneau de sélection -->
        @if (isSelected(b)) {
          <circle
            [attr.cx]="b.x" [attr.cy]="b.y" r="18"
            fill="none" stroke="#ffffff" stroke-width="1.5"
            stroke-dasharray="4 3" class="selection-ring"
          />
        }

        <!-- Pulse pour alertes -->
        @if (b.level >= 1) {
          <circle
            [attr.cx]="b.x" [attr.cy]="b.y" r="16"
            [attr.stroke]="dotFill(b.level)"
            fill="none" stroke-width="1.5"
            class="pulse-ring"
          />
        }

        <!-- Point central -->
        <circle
          [attr.cx]="b.x" [attr.cy]="b.y" r="10"
          [attr.fill]="dotFill(b.level)"
          stroke="#1e293b" stroke-width="2"
          class="bracelet-dot"
        />

        <!-- ID -->
        <text
          [attr.x]="b.x" [attr.y]="b.y + 4"
          text-anchor="middle"
          fill="#0f172a"
          font-family="'Fira Code',monospace"
          font-size="9" font-weight="700"
        >{{ b.id }}</text>

        <!-- Coordonnées sous le point -->
        <text
          [attr.x]="b.x" [attr.y]="b.y + 24"
          text-anchor="middle"
          fill="rgba(148,163,184,0.55)"
          font-family="'Fira Code',monospace"
          font-size="8"
        >{{ b.x }}, {{ b.y }}</text>
      </g>
    }

    <!-- Légende précision -->
    <text x="760" y="490" text-anchor="end" fill="rgba(148,163,184,0.3)"
      font-family="'Fira Code',monospace" font-size="8">précision ±10–15 m</text>
  </svg>
</div>
