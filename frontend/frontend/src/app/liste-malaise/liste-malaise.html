<div class="container">
  <h2>Liste des malaises</h2>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Type</th>
        <th>Âge</th>
        <th>Sexe</th>
        <th>Zone</th>
        <th>Densité</th>
        <th>Événement</th>
        <th>Gravité</th>
        <th>Intervention</th>
        <th>Heure</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let m of malaiseService.getMalaises()">
        <td>{{ m.date }}</td>
        <td>{{ m.type }}</td>
        <td>{{ m.age }}</td>
        <td>{{ m.sexe }}</td>
        <td>{{ m.zone }}</td>
        <td>{{ m.densite }}</td>
        <td>{{ m.event }}</td>
        <td>{{ m.gravite }}</td>
        <td>{{ m.intervention }}</td>
        <td>{{ m.heure }}</td>
      </tr>
    </tbody>
  </table>
</div>
